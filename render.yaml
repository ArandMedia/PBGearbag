services:
  - type: web
    name: pbgearbag-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build --workspace=@pbg/shared && npm run build --workspace=@pbg/backend
    startCommand: npm run migration:run --workspace=@pbg/backend && npm run start:prod --workspace=@pbg/backend
    healthCheckPath: /api/v1/health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        value: 'true'
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: pbgearbag-media
      - key: R2_PUBLIC_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: '587'
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        value: PBGearbag <noreply@pbgearbag.com>
