version: '3.8'

# Local development stack. Production runs the backend on Render (see root
# Dockerfile) against a Neon Postgres database, not this compose file.

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: pbg-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pbg_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pbg-backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: password
      DB_DATABASE: pbg_dev
      DB_SYNC: 'true'
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRATION: 7d
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run start:dev

  # pgAdmin (Database Management UI — optional, dev convenience only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pbg-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pbg.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  default:
    name: pbg-network
